# fly.toml app configuration file generated for nuvylux-backend on 2026-03-09T15:43:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nuvylux-backend'
primary_region = 'iad'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'
  seed_command = 'ts-node prisma/seed.ts'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
